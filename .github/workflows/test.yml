name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install ruff
      - run: ruff check tests/

  test:
    name: pytest (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Layer 1 tests are HA-free, so this matrix tracks Python versions.
        # When Layer 2 (pytest-homeassistant-custom-component) is added, add an
        # HA-version axis here (floor 2024.1.0 + latest).
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -r requirements.test.txt
      - run: python -m pytest
